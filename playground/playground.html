<!DOCTYPE html>
<html>

<head>
    <!-- Basic idea according to examples from https://github.com/easywasm/wasi -->
    <script type="importmap">
        {
            "imports": {
                "@easywasm/wasi": "./playground/easywasm_wasi.js",
                "web-zen-dev": "./playground/web-devfs.js"
            }
        }
    </script>
    <script type="module">
        import { WasiPreview1 } from '@easywasm/wasi';
        import { framebuffer } from 'web-zen-dev';

        const d = new TextDecoder();
        let consoleWindow;
        let canvas;
        let fb;

        let exports;

        window.initPage = function initPage() {
            attachGui();
            populateWasmModules();
        };

        //-------------------------------------------------------------
        // module 'canvas' to use for drawing on the canvas from inside
        // the WASM module

        function canvas_width() {
            return canvas.width;
        }

        function canvas_height() {
            return canvas.height;
        }

        //-------------------------------------------------------------

        const wasi_snapshot_preview1 = new WasiPreview1();
        wasi_snapshot_preview1.stdout = s => {
            let t = d.decode(s);
            consoleWindow.innerHTML += t.replace("\n", "<br />");
        }

        //-------------------------------------------------------------

        async function runApplication() {
            const selectionEl = document.getElementById("appList");
            const selIndex = selectionEl.options.selectedIndex;
            const wasmModuleName = selectionEl.options[selIndex].text;

            const { instance } = await WebAssembly.instantiateStreaming(fetch(wasmModuleName), {
                    wasi_snapshot_preview1,
                    canvas: { width: canvas_width, height: canvas_height }
            });

            exports = instance.exports;
            console.log(exports);

            if ("create_frame" in exports)
            {
                // This seems to be a drawing-API based application
                let frame_base = exports.create_frame();
                const view = new Uint8Array(exports.memory.buffer, frame_base, canvas.width*canvas.height*4);
                fb.write({ device: { driver: {  } } }, view);
            }
            else
            {
                // This seems to be a pure WASI-CLI based application
                let res = wasi_snapshot_preview1.start(exports);

                const exitCodeEl = document.getElementById("exitCode");
                exitCodeEl.value = res;
                exitCodeEl.classList.add('flash');
                setTimeout(() => {
                    exitCodeEl.classList.remove('flash');
                }, 500);
                console.log("appplication exit code: " + res);
            }
        }

        function clearConsole() {
            consoleWindow.innerHTML = "";
        }

        //-------------------------------------------------------------

        function attachGui() {
            const btn = document.getElementById('runButton');
            btn.addEventListener('click', runApplication);

            const btnClear = document.getElementById('clearConsole');
            btnClear.addEventListener('click', clearConsole);

            consoleWindow = document.getElementById('consoleOutput');

            canvas = document.getElementById('fb');
            fb = framebuffer({ canvas });
        }

        async function populateWasmModules() {
            const resp = await fetch("/api/module");
            if (!resp.ok) {
                throw new Error("Failure while checking available modules");
            }
            const data = await resp.json();

            const selectionEl = document.getElementById("appList");
            for (let i=0; i<selectionEl.options.length; i++) {
                selectionEl.options.remove(i);
            }
            for (const mod of data.modules) {
                const c = document.createElement("option");
                c.text = mod;
                selectionEl.options.add(c);
            }
        }
    </script>
    <style>
        #exitCode {
            width: 3em;
        }
        #exitCodeLbl {
            margin-left: 3em;
        }

        div:has(#clearConsole) {
            margin-top: 1em;
        }
        div:has(#appList) {
            margin-bottom: 1em;
        }

        fieldset {
            margin-top: 2em;
        }
        #consoleOutput {
            position: relative;

            font-family: 'Courier New', Courier, monospace;

            resize: vertical;
            overflow: auto;
            width: 100%;
            min-height: 100px;
        }

        canvas {
            border: 1px solid black;
        }

        .flash {
            animation: flash 1s ease-out;
        }
        @keyframes flash {
            0%   { box-shadow: 0 0 20px 3px cyan; }
            100% { box-shadow: 0 0 0 0 transparent; }
        }
    </style>
</head>

<body onload="initPage()">
    <h1>Capy-lang Playground</h1>
    <div>
        <label for="appList">Available applications:</label>
        <select id="appList"><option>Item 1</option></select>
    </div>

    <div>
        <label>Arguments:<input id="arguments"></input></label>
        <button id="runButton">Run application</button>
        <label id="exitCodeLbl">Exit code:<input id="exitCode"></input></label>
    </div>

    <div>
        <button id="clearConsole">Clear Console</button>
    </div>
    <fieldset>
        <legend>Console output of the application</legend>
        <div id="consoleOutput">
        </div>
    </fieldset>

    <canvas id="fb"></canvas>
</body>

</html>
