name: CI

on:
  push:
    branches:
      - main
  pull_request:
  release:
    types:
      - published

jobs:
  build-and-test-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup WASI toolchain and wasm tools
        uses: ./.github/actions/setup-wasm-toolchain
        with:
          wasi-version: "29"

      - name: Configure
        shell: pwsh
        run: cmake -S . -B build -G Ninja --toolchain cmake/wasm-wasip-clang.cmake

      - name: Build compiler and unit tests
        shell: pwsh
        run: cmake --build build

      - name: Run C++ unit tests
        shell: pwsh
        run: wasmtime run build/capylang-unit-tests.wasm

      - name: Install Python dependencies
        shell: pwsh
        run: uv sync --frozen

      - name: Initialize ANTLR toolchain
        shell: pwsh
        run: uv run antlr4 -v 4.13.2

      - name: Run pytest compiler tests
        shell: pwsh
        run: uv run pytest tests/

  package-vscode-extension:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup WASI toolchain and wasm tools
        uses: ./.github/actions/setup-wasm-toolchain
        with:
          wasi-version: "29"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Install npm dependencies
        working-directory: capylang
        run: npm install

      - name: Package VSCode extension
        working-directory: capylang
        run: vsce package

      - name: Upload VSIX as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: capylang-vscode-extension
          path: capylang/*.vsix
          if-no-files-found: error

      - name: Attach VSIX to GitHub release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: capylang/*.vsix

  build-and-test-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup WASI toolchain and wasm tools
        uses: ./.github/actions/setup-wasm-toolchain
        with:
          wasi-version: "29"

      - name: Configure
        run: cmake -S . -B build -G Ninja --toolchain cmake/wasm-wasip-clang.cmake

      - name: Build compiler and unit tests
        run: cmake --build build

      - name: Run C++ unit tests
        run: wasmtime run build/capylang-unit-tests.wasm

      - name: Install Python dependencies
        run: uv sync --frozen

      - name: Initialize ANTLR toolchain
        run: uv run antlr4 -v 4.13.2

      - name: Generate grammar artifacts
        run: uv run antlr4 -Dlanguage=Python3 ./grammar/CapylangParserGrammar.g4 ./grammar/CapylangLexerGrammar.g4

      - name: Run pytest compiler tests
        run: uv run pytest tests/
